spring:
  application:
    name: sign-up

  datasource:
    url: ${POSTGRESQL_URL}
    username: ${POSTGRESQL_USERNAME}
    password: ${POSTGRESQL_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true



secret:
  smtp:
    google:
      password: ${GOOGLE_SMTP_PASSWORD}

  jwt:
    key: ${JWT_SECRET}
