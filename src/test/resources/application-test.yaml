spring:
  config:
    activate:
      on-profile: test
  mail:
    host: smtp.gmail.com
    port: 587
    username: test@example.com
    password: test-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: create-drop
  jwt:
    key: bXktc2VjcmV0LWtleS1Mb3JlbS1pcHN1bS1kb2xvci1zaXQtYW1ldA
    expiration:
      access: 600
      refresh: 604800
      invite: 172800
      validate: 600

frontend:
  url: http://localhost:3000

auth:
  refresh-cookie:
    name: refreshToken
    http-only: true
    secure: false
    same-site: Lax
    path: /auth
